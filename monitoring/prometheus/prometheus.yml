global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ─────────────────────────────────────────
# Reglas de alerta (SLO 99.9% disponibilidad)
# ─────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # Configurar Alertmanager si se usa

# ─────────────────────────────────────────
# Scrape configs
# ─────────────────────────────────────────
scrape_configs:
  # La propia app NestJS (ya tiene prom-client integrado)
  - job_name: 'app-registro'
    static_configs:
      - targets: ['app-registro-svc:80']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Kubernetes pods con annotation prometheus.io/scrape=true
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)

  # Prometheus mismo
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
