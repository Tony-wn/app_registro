apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-registro
  namespace: production
  labels:
    app: app-registro
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-registro
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime deployment
  template:
    metadata:
      labels:
        app: app-registro
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Seguridad: no root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: app
          image: ghcr.io/depresslyjuice/app_registro:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          # Recursos: obligatorio para HPA
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Readiness: solo recibe tráfico cuando está listo
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          # Liveness: reinicia si se cuelga
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          # Variables de entorno desde ConfigMap y Secrets
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          # Seguridad del contenedor
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      # Distribución entre nodos para alta disponibilidad
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [app-registro]
                topologyKey: kubernetes.io/hostname
